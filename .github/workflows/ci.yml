name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # No third-party deps: the MVP is pure standard library.
      - name: Run tests
        run: python -m unittest discover -s tests -t . -v
      - name: coverage@precision regression gate (fixed gold sets)
        run: python -m unittest tests.test_regression -v
      - name: Smoke-test the demo loop (source tree)
        run: python -m tessera --db ci.db demo --target 0.95
      - name: Smoke-test the pairwise demo loop
        run: python -m tessera --db ci-pw.db demo --pairwise --target 0.95
      - name: Smoke-test the installed wheel from a neutral directory
        shell: bash
        run: |
          pip install .
          cd "$RUNNER_TEMP"
          tessera --db ci2.db demo --target 0.95   # fails if sample_data isn't packaged
